<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC26 AI Dashboard</title>

<style>
:root{
  --bg:#0b1220;
  --card:#111827;
  --border:#374151;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --blue:#2563eb;
  --red:#dc2626;
  --amber:#f59e0b;
  --green:#059669;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:24px;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,Segoe UI,Arial,sans-serif;
}

.header{
  margin-bottom:24px;
}

h1{
  margin:0 0 16px 0;
  font-size:42px;
}

.nav{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.btn{
  background:var(--blue);
  color:white;
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
}

.btn.secondary{
  background:#374151;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

.risk-card{
  margin-top:15px;
  transition:.2s;
}

.risk-card:hover{
  border-color:#60a5fa;
}

.tag{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  margin-right:8px;
  font-weight:600;
}

.red{
  background:#7f1d1d;
  color:#fecaca;
}

.amber{
  background:#78350f;
  color:#fde68a;
}

.green{
  background:#064e3b;
  color:#a7f3d0;
}

.muted{
  color:var(--muted);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

th{
  color:#cbd5e1;
}

a{
  color:#93c5fd;
}

.refresh{
  color:var(--muted);
  margin-bottom:15px;
}

.empty{
  color:var(--muted);
  text-align:center;
  padding:20px;
}

@media(max-width:768px){

  body{
    padding:14px;
  }

  h1{
    font-size:30px;
  }

}
</style>
</head>

<body>

<div class="header">

<h1>FIFA WORLD CUP 2026 – Global Security Desk</h1>

<div class="nav">

<a class="btn" href="index.html">
AI Dashboard
</a>

<a class="btn secondary" href="wc-index.html">
Operations Center
</a>

</div>

<div class="refresh">
Last update:
<span id="lastUpdated">Loading...</span>
</div>

</div>

<div class="card">

<h2>Core Risk Intelligence</h2>

<div id="risks">
Loading...
</div>

</div>

<div class="card">

<h2>Threat Monitoring Timeline</h2>

<table>

<thead>
<tr>
<th>Date</th>
<th>Location</th>
<th>Event</th>
<th>Impact</th>
</tr>
</thead>

<tbody id="timeline">
</tbody>

</table>

</div>

<script>

async function loadData(){

  try{

    const response =
      await fetch(
        './data.json?t=' + Date.now(),
        { cache:'no-store' }
      );

    const data = await response.json();

    const lastUpdated =
      data.lastUpdated
      ? new Date(data.lastUpdated).toUTCString()
      : "Unknown";

    document.getElementById(
      "lastUpdated"
    ).textContent = lastUpdated;

    const risks =
      document.getElementById("risks");

    risks.innerHTML = "";

    if(
      !data.risks ||
      data.risks.length === 0
    ){

      risks.innerHTML =
        '<div class="empty">No relevant WC26 risks found.</div>';

    } else {

      data.risks.forEach(risk=>{

        let sevClass = "green";

        if(
          risk.severityColor === "red"
        ){
          sevClass = "red";
        }
        else if(
          risk.severityColor === "orange"
        ){
          sevClass = "amber";
        }

        const div =
          document.createElement("div");

        div.className =
          "card risk-card";

        div.innerHTML = `

          <h3>${risk.title}</h3>

          <p>

            <span class="tag ${sevClass}">
              ${risk.severityText}
            </span>

            <span class="tag green">
              ${risk.status}
            </span>

          </p>

          <p>
            ${risk.description || ""}
          </p>

          ${(risk.links || [])
            .map(link => `
              <div>
                <a href="${link.url}"
                   target="_blank">
                   ${link.label}
                </a>
              </div>
            `).join("")
          }

        `;

        risks.appendChild(div);

      });

    }

    const timeline =
      document.getElementById(
        "timeline"
      );

    timeline.innerHTML = "";

    if(
      !data.timeline ||
      data.timeline.length===0
    ){

      timeline.innerHTML = `
        <tr>
          <td colspan="4">
            No timeline entries
          </td>
        </tr>
      `;

    } else {

      data.timeline.forEach(item=>{

        const row =
          document.createElement("tr");

        row.innerHTML = `
          <td>${item.date || ""}</td>
          <td>${item.loc || ""}</td>
          <td>${item.event || ""}</td>
          <td>${item.impact || ""}</td>
        `;

        timeline.appendChild(row);

      });

    }

  }
  catch(error){

    console.error(error);

    document.getElementById(
      "risks"
    ).innerHTML = `
      <div class="empty">
        Failed to load dashboard data.
      </div>
    `;

  }

}

loadData();

setInterval(
  loadData,
  300000
);

</script>

</body>
</html>
