name: Auto-Update Dashboard Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-intel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests

      - name: Run data generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python update_data_clean.py

      - name: Confirm generated dataset
        run: |
          ls -la
          test -f data.json
          echo "data.json generated successfully"

      - name: Commit updated dataset
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update threat intel [skip ci]"
          file_pattern: data.json
