name: Auto-Update Dashboard Data

on:
  schedule:
    - cron: '*/5 * * * *' # Increased frequency to every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt into Node.js 24 to fix the GitHub Actions deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install required libraries
        run: pip install google-generativeai feedparser requests

      - name: Run the brain script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_data.py

      - name: Save new data to repository
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-update threat intel [skip ci]"
          file_pattern: "data.json"
