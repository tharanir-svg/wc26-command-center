name: Auto-Update Dashboard Data

on:
  schedule:
    - cron: '0 */4 * * *' # This runs every 4 hours automatically
  workflow_dispatch: # This allows you to click a button to run it manually

permissions:
  contents: write

jobs:
  update-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install required libraries
        run: pip install google-generativeai feedparser requests

      - name: Run the brain script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_data.py

      - name: Save new data to repository
        run: |
          git config --global user.name "GSD Automation Bot"
          git config --global user.email "action@github.com"
          git add data.json
          git commit -m "Auto-update threat intel [skip ci]" || echo "No changes to commit"
          git push
