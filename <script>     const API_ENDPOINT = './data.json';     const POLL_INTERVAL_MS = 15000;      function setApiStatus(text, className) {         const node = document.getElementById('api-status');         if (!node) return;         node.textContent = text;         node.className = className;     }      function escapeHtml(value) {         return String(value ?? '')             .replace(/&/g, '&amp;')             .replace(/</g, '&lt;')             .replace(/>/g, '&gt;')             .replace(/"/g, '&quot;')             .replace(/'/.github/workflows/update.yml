name: Auto-Update Dashboard Data

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-intel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Run the data generator
        run: python update_data.py

      - name: Confirm generated dataset
        run: |
          ls -la
          test -f data.json
          echo "data.json generated successfully"

      - name: Commit updated dataset
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Auto-update threat intel [skip ci]"
          file_pattern: data.json
